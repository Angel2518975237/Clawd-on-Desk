<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bubble-bg: rgba(255, 255, 255, 0.96);
  --bubble-border: rgba(15, 23, 42, 0.08);
  --bubble-shadow: 0 14px 32px rgba(15, 23, 42, 0.14), 0 3px 10px rgba(15, 23, 42, 0.08);
  --label-color: rgba(71, 85, 105, 0.92);
  --text-color: #0f172a;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bubble-bg: rgba(17, 24, 39, 0.94);
    --bubble-border: rgba(255, 255, 255, 0.08);
    --bubble-shadow: 0 14px 32px rgba(0, 0, 0, 0.32), 0 3px 10px rgba(0, 0, 0, 0.18);
    --label-color: rgba(203, 213, 225, 0.8);
    --text-color: #f8fafc;
  }
}

html, body {
  width: 100%;
  height: 100%;
  background: transparent;
  overflow: hidden;
  user-select: none;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  -webkit-font-smoothing: antialiased;
}

.wrap {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding: 8px 10px 18px;
}

.bubble {
  position: relative;
  width: 100%;
  min-height: 94px;
  padding: 14px 16px;
  border-radius: 18px;
  border: 1px solid var(--bubble-border);
  background: var(--bubble-bg);
  box-shadow: var(--bubble-shadow);
  opacity: 0;
  transform: translateY(10px) scale(0.96);
  transition: opacity 0.18s ease, transform 0.2s ease;
}

.bubble::after {
  content: "";
  position: absolute;
  left: 32px;
  bottom: -10px;
  width: 18px;
  height: 18px;
  background: var(--bubble-bg);
  border-right: 1px solid var(--bubble-border);
  border-bottom: 1px solid var(--bubble-border);
  transform: rotate(45deg);
}

.bubble.visible {
  opacity: 1;
  transform: translateY(0) scale(1);
}

.bubble.hiding {
  opacity: 0;
  transform: translateY(8px) scale(0.98);
}

.label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.04em;
  color: var(--label-color);
  text-transform: uppercase;
}

.text {
  margin-top: 8px;
  font-size: 14px;
  line-height: 1.45;
  color: var(--text-color);
  white-space: pre-wrap;
  word-break: break-word;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
</style>
</head>
<body>
  <div class="wrap">
    <div class="bubble" id="bubble">
      <div class="label" id="label">Latest Reply</div>
      <div class="text" id="text"></div>
    </div>
  </div>

  <script>
    const bubble = document.getElementById("bubble");
    const label = document.getElementById("label");
    const text = document.getElementById("text");

    function setLanguage(lang) {
      label.textContent = lang === "zh" ? "最近回复" : "Latest Reply";
    }

    function showBubble(data) {
      setLanguage(data?.lang);
      text.textContent = data?.text || "";
      bubble.classList.remove("hiding");
      bubble.classList.add("visible");
    }

    function hideBubble() {
      bubble.classList.remove("visible");
      bubble.classList.add("hiding");
    }

    window.speechAPI.onUpdate(showBubble);
    window.speechAPI.onHide(hideBubble);
  </script>
</body>
</html>
